<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prestige Travels | Redirecting...</title>
  <meta name="description" content="Prestige Travels - Bespoke luxury travel designed by human experts.">
  <link rel="alternate" hreflang="en" href="https://prestige-travels.nl/en/index.html" />
  <link rel="alternate" hreflang="nl" href="https://prestige-travels.nl/nl/index.html" />
  <link rel="alternate" hreflang="x-default" href="https://prestige-travels.nl/en/index.html" />
  <script>
    (function() {
      var stored = localStorage.getItem('pt-lang');
      if (stored === 'nl' || stored === 'en') {
        window.location.replace('/' + stored + '/index.html');
        return;
      }
      var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
      var target = lang.startsWith('nl') ? 'nl' : 'en';
      window.location.replace('/' + target + '/index.html');
    })();
  </script>
</head>
<body>
  <p style="font-family: sans-serif; text-align: center; margin-top: 40vh;">Redirecting...</p>
  <noscript>
    <p style="font-family: sans-serif; text-align: center;">
      <a href="/en/index.html">English</a> | <a href="/nl/index.html">Nederlands</a>
    </p>
  </noscript>
</body>
</html>
